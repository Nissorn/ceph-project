project:
  name: "cephalometric-singapodent"
  version: "0.1.0"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  annotation_file: "data/annotations.xml"
  image_dir: "data/raw/images"
  landmarks_json: "data/processed/landmarks_clean.json"
  calibration_csv: "data/processed/calibration.csv"

keypoints:
  names:
    - "Upper_tip"
    - "Upper_apex"
    - "Labial_midroot"
    - "Labial_crest"
    - "Palatal_midroot"
    - "Palatal_crest"
    - "ANS"
    - "PNS"
    - "LB"
    - "PB"
  num_keypoints: 10
  calibration_mm: 30.0

model:
  architecture: "hrnet_w32"
  pretrained: "coco"
  input_size: [512, 512]
  heatmap_size: [256, 256]
  sigma: 2.0

training:
  batch_size: 4
  epochs: 100          # max epochs; early stopping will terminate sooner if val_mre plateaus
  lr: 0.001
  weight_decay: 0.0001
  device: "cuda"       # "cuda" for GPU server, "mps" for Mac
  num_workers: 0
  eval_strategy: "5fold"  # "5fold" for 5-fold CV (use get_kfold_splits)
  k_folds: 5
  early_stopping_patience: 15   # stop if val_mre doesn't improve for 15 evaluation windows (~15 epochs)
  freeze_backbone: false        # unfrozen from Epoch 1 — full gradient flow for medical domain transfer
  warmup_epochs: 0             # not used when freeze_backbone=false

augmentation:
  rotation_limit: 10
  zoom_limit: 0.1
  brightness_limit: 0.2
  contrast_limit: 0.2
  clahe: true
  horizontal_flip: false  # NEVER true — breaks lateral cephalogram anatomy

phase3:
  # PENDING confirmation from Dr.
  tipping_threshold_deg: null
  translation_threshold_mm: null
  treatment_classes:
    - "Uncontrolled_tipping"
    - "Controlled_tipping"
    - "Translation"
    - "Root_torque"
    - "Extrusion"
    - "Intrusion"

evaluation:
  sdr_thresholds_mm: [2.0, 2.5, 3.0, 4.0]
  confidence_low_threshold: 0.3  # below this → flag as low confidence (red dot)
  tta_n_augments: 5