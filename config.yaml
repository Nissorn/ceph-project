project:
  name: "cephalometric-singapodent"
  version: "0.1.0"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  annotation_file: "data/annotations.xml"
  image_dir: "data/raw/images"
  landmarks_json: "data/processed/landmarks_clean.json"
  calibration_csv: "data/processed/calibration.csv"

keypoints:
  names:
    - "Upper_tip"
    - "Upper_apex"
    - "Labial_midroot"
    - "Labial_crest"
    - "Palatal_midroot"
    - "Palatal_crest"
    - "ANS"
    - "PNS"
    - "LB"
    - "PB"
  num_keypoints: 10
  calibration_mm: 30.0

model:
  # architecture: "hrnet_w32" (default) | "hrnet_w18" (fallback-c: capacity reduction)
  architecture: "hrnet_w32"
  # pretrained_source: "coco" (default) | "ceph_miccai2015" | "ceph_cldetection2023" | "custom"
  # Pivot to ceph_* if v6 MRE > 4mm (contingency-b: domain-pretrained weights)
  pretrained_source: "coco"
  # Path to checkpoint file. Required when pretrained_source is "custom" or ceph_*.
  pretrained_checkpoint: null
  input_size: [512, 512]
  heatmap_size: [256, 256]
  sigma: 3.0
  # Landmark-specific sigmas for adaptive heatmap generation.
  # Small sigma (sharp): easy/anterior landmarks — tight Gaussian for precision.
  # Large sigma (diffuse): hard/posterior landmarks — forgiving for noisy regions.
  # Format: list of 10 floats aligned with keypoints.names order.
  # Keypoints: Upper_tip(0), Upper_apex(1), Labial_midroot(2), Labial_crest(3),
  #            Palatal_midroot(4), Palatal_crest(5), ANS(6), PNS(7), LB(8), PB(9)
  landmark_sigmas: [2.0, 3.5, 2.5, 2.0, 3.0, 2.0, 4.5, 4.5, 4.0, 5.0]

training:
  batch_size: 4
  epochs: 150         # 150 epochs with partial freeze + differential LR
  lr: 0.001
  weight_decay: 0.001   # heavy L2 regularization to combat overfitting on 92 images
  device: "mps"        # "mps" for Mac, "cuda" for GPU server
  num_workers: 0        # 0 for MPS restriction
  eval_strategy: "5fold"  # "5fold" for 5-fold CV (use get_kfold_splits)
  k_folds: 5
  early_stopping_patience: 15
  freeze_backbone: false
  warmup_epochs: 0
  partial_freeze: true
  backbone_lr: 0.0001
  head_lr: 0.0001
  weight_decay: 0.002

augmentation:
  rotation_limit: 15
  zoom_limit: 0.2
  brightness_limit: 0.2
  contrast_limit: 0.2
  clahe: true
  horizontal_flip: false

phase3:
  tipping_threshold_deg: null
  translation_threshold_mm: null
  treatment_classes:
    - "Uncontrolled_tipping"
    - "Controlled_tipping"
    - "Translation"
    - "Root_torque"
    - "Extrusion"
    - "Intrusion"

phase2c:
  backbone_unfreeze_epoch: 20
  stage2_lr: 0.00001
  inject_training_noise: false
  min_class_support: 5  # Classes with fewer positives are flagged "insufficient_data" and excluded from pos_weight + AUC
  # Calibrate noise_sigma_pixels to actual Phase 2 HRNet MRE once v6 benchmarks are available.
  # At 0.0984 mm/px, 15 px ≈ 1.5 mm which approximates expected MRE for a small-dataset HRNet.
  noise_sigma_pixels: 15.0

evaluation:
  sdr_thresholds_mm: [2.0, 2.5, 3.0, 4.0]
  confidence_low_threshold: 0.3
  tta_n_augments: 5