project:
  name: "cephalometric-singapodent"
  version: "0.1.0"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  annotation_file: "data/annotations.xml"
  image_dir: "data/raw/images"
  landmarks_json: "data/processed/landmarks_clean.json"
  calibration_csv: "data/processed/calibration.csv"

keypoints:
  names:
    - "Upper_tip"
    - "Upper_apex"
    - "Labial_midroot"
    - "Labial_crest"
    - "Palatal_midroot"
    - "Palatal_crest"
    - "ANS"
    - "PNS"
    - "LB"
    - "PB"
  num_keypoints: 10
  calibration_mm: 30.0

model:
  architecture: "hrnet_w32"
  pretrained: "coco"
  input_size: [512, 512]
  heatmap_size: [256, 256]
  sigma: 5.0

training:
  batch_size: 4
  epochs: 100
  lr: 0.0003
  weight_decay: 0.0005
  device: "cuda"
  num_workers: 0
  eval_strategy: "5fold"
  k_folds: 5
  early_stopping_patience: 15
  freeze_backbone: false
  warmup_epochs: 0
  partial_freeze: true
  backbone_lr: 0.0003
  head_lr: 0.0005

augmentation:
  rotation_limit: 15
  zoom_limit: 0.2
  brightness_limit: 0.2
  contrast_limit: 0.2
  clahe: true
  horizontal_flip: false

phase3:
  tipping_threshold_deg: null
  translation_threshold_mm: null
  treatment_classes:
    - "Uncontrolled_tipping"
    - "Controlled_tipping"
    - "Translation"
    - "Root_torque"
    - "Extrusion"
    - "Intrusion"

evaluation:
  sdr_thresholds_mm: [2.0, 2.5, 3.0, 4.0]
  confidence_low_threshold: 0.3
  tta_n_augments: 5
