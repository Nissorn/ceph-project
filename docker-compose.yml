services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app:/app/backend
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./models:/app/models

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    depends_on:
      - api
