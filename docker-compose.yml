services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app:/app/backend
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./backend/models:/app/models
      - ./outputs:/app/outputs
      - ./src:/app/src
      - ./config.yaml:/app/config.yaml

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    volumes:
      - ./frontend/src:/app/src:ro
    depends_on:
      - api
