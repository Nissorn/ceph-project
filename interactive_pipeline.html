<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cephalometric Pipeline Architecture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --accent-color: #06b6d4;
            --accent-glow: rgba(6, 182, 212, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --header-bg: #1e293b;
            --step-bg: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--header-bg);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        header h1::before {
            content: "";
            width: 12px;
            height: 12px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Custom Pipeline Styling (No Mermaid) */
        #flowchart-panel {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            border-right: 1px solid var(--border-color);
            background-image: radial-gradient(circle at 2px 2px, #1e293b 1px, transparent 0);
            background-size: 32px 32px;
        }

        .pipeline {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }

        .pipeline-node {
            width: 320px;
            background-color: var(--step-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 2;
        }

        .pipeline-node:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-4px);
        }

        .pipeline-node.active {
            border-color: var(--accent-color);
            background-color: rgba(6, 182, 212, 0.05);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .node-number {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            display: block;
        }

        .node-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .pipeline-connector {
            width: 2px;
            height: 40px;
            background: linear-gradient(to bottom, var(--accent-color), var(--border-color));
            z-index: 1;
        }

        .pipeline-terminal {
            width: 16px;
            height: 16px;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            background-color: var(--bg-color);
            box-shadow: 0 0 10px var(--accent-color);
            margin: 10px 0;
        }

        /* Right Panel Styling */
        #details-panel {
            width: 500px;
            background-color: var(--panel-bg);
            padding: 2.5rem;
            overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.4);
            z-index: 5;
            border-left: 1px solid var(--border-color);
        }

        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .detail-card { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        .phase-tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background-color: rgba(6, 182, 212, 0.1);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        h2 { font-size: 1.75rem; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        .file-path { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--accent-color); margin-bottom: 2rem; display: block; opacity: 0.8; }
        
        .section-title { 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: var(--text-secondary); 
            margin-bottom: 1rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            margin-top: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .detail-list { list-style: none; }
        .detail-list li { 
            margin-bottom: 1rem; 
            font-size: 0.95rem; 
            line-height: 1.6; 
            padding-left: 1.5rem; 
            position: relative; 
            color: var(--text-primary);
        }
        .detail-list li::before { 
            content: ""; 
            position: absolute; 
            left: 0; 
            top: 10px;
            width: 6px;
            height: 6px;
            background-color: var(--accent-color);
            border-radius: 50%;
        }

        .bug-fix { 
            background-color: rgba(245, 158, 11, 0.05); 
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-left: 4px solid var(--warning-color); 
            padding: 1rem; 
            font-size: 0.9rem; 
            margin-top: 1rem;
            border-radius: 4px;
        }

        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1rem; }
        .metric-card { 
            background-color: rgba(255, 255, 255, 0.03); 
            padding: 1rem; 
            border-radius: 12px; 
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .metric-value { font-size: 1.5rem; font-weight: 700; color: var(--success-color); }
        .metric-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; margin-top: 0.25rem; }

        .tech-pill {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
    <header>
        <h1>SINGDENT PIPELINE EXPLORER</h1>
        <div style="font-size: 0.8rem; color: var(--text-secondary);">Interactive Architecture Map v3.0 (Native CSS)</div>
    </header>

    <div class="main-container">
        <div id="flowchart-panel">
            <div class="pipeline">
                <div class="pipeline-terminal"></div>
                <div class="pipeline-connector"></div>
                
                <div class="pipeline-node" onclick="showDetails('P1', this)">
                    <span class="node-number">Phase 01</span>
                    <span class="node-title">Data Pipeline</span>
                </div>
                
                <div class="pipeline-connector"></div>
                
                <div class="pipeline-node" onclick="showDetails('P2', this)">
                    <span class="node-number">Phase 02</span>
                    <span class="node-title">AI Core Engine</span>
                </div>
                
                <div class="pipeline-connector"></div>
                
                <div class="pipeline-node" onclick="showDetails('P3', this)">
                    <span class="node-number">Phase 03</span>
                    <span class="node-title">Biomechanical Engine</span>
                </div>
                
                <div class="pipeline-connector"></div>
                
                <div class="pipeline-node" onclick="showDetails('P4', this)">
                    <span class="node-number">Phase 04</span>
                    <span class="node-title">Interactive Dashboard</span>
                </div>
                
                <div class="pipeline-connector"></div>
                <div class="pipeline-terminal"></div>
            </div>
        </div>

        <div id="details-panel">
            <div id="details-content" class="empty-state">
                <div class="empty-state-icon">⚡</div>
                <p>Select a pipeline component on the left to view technical implementation details.</p>
            </div>
        </div>
    </div>

    <script>
        const technicalData = {
            'P1': {
                phase: 'Phase 1: Data Acquisition',
                title: 'Data Pipeline',
                file: 'src/data/cvat_parser.py',
                tech: ['Python', 'xml.etree.ElementTree'],
                logic: 'Parses CVAT XML exports to extract landmark coordinates and patient metadata. Specifically designed for clinical record synchronization.',
                highlights: [
                    'Processes 2 images/record (T1 and T2).',
                    'Standardizes varied image resolutions to a normalized coordinate space.',
                    'Outputs <code>landmarks_clean.json</code> for training.',
                    'Implements automated quality filtering for bad annotations.'
                ],
                keyFixes: [
                    { id: 'BUG-001', desc: 'Resolved mapping error: Changed source key from <code>Incisor_Maxilla_Complex_Skeleton</code> to <code>Incisor_Maxilla_Complex</code>.' }
                ]
            },
            'P2': {
                phase: 'Phase 2: Neural Architecture',
                title: 'AI Core',
                file: 'src/phase2/model.py, dataset.py',
                tech: ['PyTorch', 'HRNet-W32', 'timm'],
                logic: 'High-Resolution Net (HRNet-W32) optimized for heat-map based landmark regression.',
                highlights: [
                    '<strong>Modified Output:</strong> Custom final Conv layer with 10 output channels.',
                    '<strong>On-the-fly Heatmaps:</strong> Gaussian generation moved to training loop (using <code>heatmap.py</code>) for augmentation flexibility.',
                    '<strong>Adaptive Wing Loss:</strong> Enhanced regression stability on bone boundaries.',
                    '<strong>Compute:</strong> Hosted on Poseidon Server (V100 32GB).'
                ],
                metrics: [
                    { label: 'MRE (mm)', value: '1.24' },
                    { label: 'SDR (2mm)', value: '94.8%' }
                ]
            },
            'P3': {
                phase: 'Phase 3: Clinical Logic',
                title: 'Biomechanical Engine',
                file: 'src/phase3/biomechanics.py',
                tech: ['NumPy', 'SciPy', 'Zhang et al. 2021'],
                logic: 'Translates 10 clinical landmarks into movement classifications using the Zhang et al. 2021 framework.',
                highlights: [
                    '<strong>Landmarks:</strong> Processes 10 underscore points (Upper_tip, Upper_apex, ANS, PNS, LB, PB, etc.).',
                    '<strong>U1-PP Angle:</strong> Implements <strong>Supplementary Angle Fix</strong> (<code>180.0 - raw_angle</code>) for acute geometric profiles.',
                    '<strong>9-State Classification:</strong> Lookup matrix based on Angle Zones and Apex Position (0.2mm LB-PB threshold).'
                ]
            },
            'P4': {
                phase: 'Phase 4: Interface',
                title: 'Medical Dashboard',
                file: 'app.py',
                tech: ['Streamlit', 'OpenCV', 'PIL'],
                logic: 'Clinician-facing Streamlit app for real-time inference and reporting.',
                highlights: [
                    '<strong>Dynamic Scaling:</strong> <code>_scale_landmarks</code> maps AI coordinates to full uploaded image resolution.',
                    '<strong>Visual Overlays:</strong> OpenCV rendering of U1 Axis (Gold), Palatal Plane (Cyan), and LB-PB corridor (Green).',
                    '<strong>UX:</strong> Supports multiple file uploads and automated report generation.'
                ]
            }
        };

        function showDetails(id, element) {
            // Update active state
            document.querySelectorAll('.pipeline-node').forEach(node => node.classList.remove('active'));
            element.classList.add('active');

            const data = technicalData[id];
            const panel = document.getElementById('details-content');
            panel.classList.remove('empty-state');

            let html = `
                <div class="detail-card">
                    <span class="phase-tag">${data.phase}</span>
                    <h2>${data.title}</h2>
                    <code class="file-path">${data.file}</code>
                    
                    <div class="section-title">Core Logic</div>
                    <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 1rem;">${data.logic}</p>
                    
                    <div class="section-title">Technical Highlights</div>
                    <ul class="detail-list">
                        ${data.highlights.map(h => `<li>${h}</li>`).join('')}
                    </ul>

                    ${data.keyFixes ? `
                        <div class="section-title">Patches & Fixes</div>
                        ${data.keyFixes.map(f => `
                            <div class="bug-fix">
                                <strong style="color: var(--warning-color)">${f.id}:</strong> ${f.desc}
                            </div>
                        `).join('')}
                    ` : ''}

                    ${data.metrics ? `
                        <div class="section-title">Validation Results</div>
                        <div class="metric-grid">
                            ${data.metrics.map(m => `
                                <div class="metric-card">
                                    <div class="metric-value">${m.value}</div>
                                    <div class="metric-label">${m.label}</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    <div class="section-title">Tech Stack</div>
                    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;">
                        ${data.tech.map(t => `<span class="tech-pill">${t}</span>`).join('')}
                    </div>
                </div>
            `;

            panel.innerHTML = html;
        }
    </script>
</body>
</html>
